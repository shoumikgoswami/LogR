name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: logr/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: logr/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: logr
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: logr
          tagName: ${{ github.ref_name }}
          releaseName: LogR ${{ github.ref_name }}
          releaseBody: |
            ## What's New in ${{ github.ref_name }}

            ### 🐛 macOS Crash Fix
            - **Fixed crash when typing in Settings** — the global keyboard hook (`rdev`) was causing a hard SIGSEGV crash on macOS when Accessibility permissions were not granted. Keyboard collection is now disabled on macOS; all other features (window tracking, clipboard, filesystem, synthesis) remain fully active.
            - **Screen Recording permission prompt** — macOS will now properly ask for Screen Recording permission when vision is first used, instead of silently failing.

            ### 📦 Installation
            | Platform | File |
            |----------|------|
            | Windows | `LogR_*_x64-setup.exe` or `LogR_*_x64_en-US.msi` |
            | macOS (Apple Silicon) | `LogR_*_aarch64.dmg` |
            | macOS (Intel) | `LogR_*_x64.dmg` |

            ### Requirements
            - **Ollama provider**: [Ollama](https://ollama.com) running locally (`ollama pull gemma3:4b`)
            - **OpenRouter provider**: API key from [openrouter.ai/keys](https://openrouter.ai/keys)

            ### macOS Notes
            - On first launch, macOS may ask for **Screen Recording** permission — grant it to enable vision (screenshot descriptions).
            - Keystroke counting is not available on macOS (no Accessibility permission required).
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
