name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: logr/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: logr/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: logr
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: logr
          tagName: ${{ github.ref_name }}
          releaseName: LogR ${{ github.ref_name }}
          releaseBody: |
            ## What's New in ${{ github.ref_name }}

            ### 🔀 Multi-Provider LLM Support
            - **OpenRouter integration** — use any cloud model (Claude, Gemini, GPT-4o, Llama, etc.) for note synthesis
            - **Active Provider selector** in Settings — configure both Ollama and OpenRouter, switch anytime
            - **One-click provider toggle** on the dashboard — tap the Provider row to switch instantly
            - Dashboard shows active **Provider**, **Model**, and **Status** in real time

            ### 👁 Vision (Screenshot Descriptions)
            - Vision now routes through the active provider — Ollama for local, OpenRouter for cloud
            - **Test Vision** button works with current (unsaved) settings
            - **Test Connection** button for OpenRouter validates your API key immediately

            ### 🛠 Fixes
            - Dashboard no longer fails to open on tray click (Windows)
            - Ollama model field always allows free-text input — supports cloud/custom model names
            - OpenRouter model picker no longer crashes with large model lists
            - Settings button added directly to dashboard for easy access

            ### 📦 Installation
            | Platform | File |
            |----------|------|
            | Windows | `LogR_*_x64-setup.exe` or `LogR_*_x64_en-US.msi` |
            | macOS (Apple Silicon) | `LogR_*_aarch64.dmg` |
            | macOS (Intel) | `LogR_*_x64.dmg` |

            ### Requirements
            - **Ollama provider**: [Ollama](https://ollama.com) running locally (`ollama pull gemma3:4b`)
            - **OpenRouter provider**: API key from [openrouter.ai/keys](https://openrouter.ai/keys)
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
